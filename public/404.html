<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <script>
    // GitHub Pages SPA fallback: save the attempted URL and redirect to base
    (function() {
      var base = '/carbontrace-webgame/';
      var fullUrl = window.location.href;
      // Store the full URL so index.html can restore it via history.replaceState
      sessionStorage.setItem('gh-pages-spa-redirect', fullUrl);
      // Redirect to the base path (index.html)
      window.location.replace(base);
    })();
  </script>
</head>
<body>
  <p style="font-family:sans-serif;text-align:center;padding:40px;color:#666;">
    Redirecting to CarbonTrace…
  </p>
</body>
</html>
